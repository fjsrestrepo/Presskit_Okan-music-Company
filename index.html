<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKAN Music Company — Press Kit 2025–26</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#111010;color:#f7f7f7;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;max-width:100vw}

/* NAV */
.nav{position:sticky;top:0;z-index:200;background:rgba(17,16,16,0.97);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:10px 20px;gap:14px;backdrop-filter:blur(16px)}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:#f7f7f7;flex-shrink:0;cursor:pointer;text-decoration:none}
.nav-logo img{height:32px;width:auto;object-fit:contain}
.nav-logo span{color:#dbf343}
.logo-img{height:auto;max-width:100%;display:block;object-fit:contain}
.nav-tabs{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:1px solid rgba(255,255,255,0.1);color:#f7f7f7;padding:5px 11px;border-radius:20px;font-size:9px;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:1px;text-transform:uppercase;transition:all .15s;font-family:'Inter',sans-serif}
.tab:hover{border-color:#dbf343;color:#dbf343}
.tab.active{background:#dbf343;border-color:#dbf343;color:#111010}

/* PANELS */
.panel{display:none}.panel.active{display:block}

/* ═══════════════════════════════════════
   PÁGINA PRINCIPAL DEL SELLO
═══════════════════════════════════════ */

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;background:#111010}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 70% 40%,rgba(104,11,214,0.06) 0%,transparent 60%),radial-gradient(ellipse at 10% 80%,rgba(219,243,67,0.04) 0%,transparent 50%)}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:60px 60px}
.hero-content{position:relative;z-index:2;padding:0 48px 80px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end}
.hero-left{display:flex;flex-direction:column;justify-content:flex-end}
.hero-right{display:flex;align-items:center;justify-content:center}
.hero-logo{max-width:100%;width:100%;height:auto;object-fit:contain;filter:drop-shadow(0 0 40px rgba(219,243,67,0.08));opacity:0.95;transition:all .4s}
.hero-logo:hover{opacity:1;filter:drop-shadow(0 0 60px rgba(219,243,67,0.15))}
.hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#dbf343;margin-bottom:28px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(54px,7vw,100px);line-height:.88;color:#f7f7f7;letter-spacing:-2px;margin-bottom:32px}
.hero-title em{color:#dbf343;font-style:normal}
.hero-tagline{font-size:clamp(11px,1.4vw,14px);color:#ccc;line-height:1.8;max-width:600px;margin-bottom:48px;font-weight:300;text-align:justify}
.hero-tagline strong{color:#f7f7f7;font-weight:500}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary{background:#dbf343;color:#111010;border:none;padding:14px 32px;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;font-family:'Inter',sans-serif;transition:all .2s}
.btn-primary:hover{background:#e8f95a;transform:translateY(-1px)}
.btn-secondary{background:transparent;color:#f7f7f7;border:1px solid rgba(255,255,255,0.2);padding:14px 32px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;font-family:'Inter',sans-serif;transition:all .2s}
.btn-secondary:hover{border-color:#dbf343;color:#dbf343}
.hero-stats{position:relative;z-index:2;border-top:1px solid rgba(255,255,255,0.06);overflow:hidden}
.stats-track{display:flex;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.stat-slide{flex:0 0 100%;padding:28px 48px;display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,0.06);box-sizing:border-box}
.hero-stat{display:flex;align-items:baseline;gap:14px;padding:0}
.hero-stat-num{font-family:'Bebas Neue',sans-serif;font-size:42px;color:#f7f7f7;line-height:1;white-space:nowrap}
.hero-stat-num span{color:#dbf343}
.hero-stat-label{font-size:9px;color:#f7f7f7;letter-spacing:2px;text-transform:uppercase;margin-top:4px;white-space:nowrap}
.stats-indicators{display:flex;justify-content:center;gap:8px;padding:12px 0 20px;position:relative;z-index:3}
.stats-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:all .3s}
.stats-dot.active{background:#dbf343;border-color:#dbf343;box-shadow:0 0 8px rgba(219,243,67,.4)}
@media(min-width:700px){
  .stat-slide{flex:0 0 50%}
}
@media(min-width:1100px){
  .stat-slide{flex:0 0 25%}
  .stats-indicators{display:none}
}

/* MANIFESTO STRIP */
.manifesto-strip{padding:80px 48px;border-bottom:1px solid rgba(255,255,255,0.06);display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.manifesto-label{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#dbf343;margin-bottom:24px}
.manifesto-text{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,4vw,56px);line-height:1.05;color:#f7f7f7}
.manifesto-text em{color:#dbf343;font-style:normal}
.manifesto-body p{font-size:14px;line-height:1.85;color:#ccc;margin-bottom:16px;text-align:justify}
.manifesto-body p strong{color:#f7f7f7;font-weight:500}
.manifesto-tagline{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#dbf343;margin-top:32px;letter-spacing:.5px}

/* PILLARS */
.pillars{padding:80px 48px;border-bottom:1px solid rgba(255,255,255,0.06)}
.section-header{margin-bottom:56px}
.section-eyebrow{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#dbf343;margin-bottom:16px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,5vw,72px);line-height:.9;color:#f7f7f7}
.pillars-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.pillar-card{background:#1a1a1a;border:1px solid rgba(255,255,255,0.05);padding:40px 36px;position:relative;overflow:hidden;transition:border-color .2s}
.pillar-card:hover{border-color:rgba(104,11,214,.3)}
.pillar-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:#dbf343;transform:scaleY(0);transform-origin:top;transition:transform .3s}
.pillar-card:hover::before{transform:scaleY(1)}
.pillar-num{font-family:'Bebas Neue',sans-serif;font-size:80px;color:rgba(219,243,67,0.05);line-height:1;position:absolute;top:20px;right:24px}
.pillar-tag{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#dbf343;margin-bottom:16px}
.pillar-name{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#f7f7f7;line-height:1;margin-bottom:16px}
.pillar-desc{font-size:13px;line-height:1.75;color:#ccc;text-align:justify}

/* VALUE PROPS */
.value-props{padding:80px 48px;border-bottom:1px solid rgba(255,255,255,0.06);background:linear-gradient(180deg,#111010 0%,#161616 100%)}
.vp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;margin-top:56px}
.vp-item{position:relative;overflow:hidden;padding:36px;background:#1a1a1a;border:3px solid rgba(255,255,255,0.05);border-radius:8px;transition:border-color .3s}
.vp-item:hover{border-color:rgba(219,243,67,.3)}
.vp-num{font-family:'Bebas Neue',sans-serif;font-size:80px;color:rgba(219,243,67,0.06);line-height:1;margin-bottom:4px;position:absolute;top:20px;right:24px}
.vp-title{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#f7f7f7;margin-bottom:10px;letter-spacing:.5px}
.vp-text{font-size:13px;line-height:1.75;color:#ccc;text-align:justify}
.vp-text strong{color:#dbf343;font-weight:600}

/* IMPACT / SOCIAL */
.impact{padding:80px 48px;border-bottom:1px solid rgba(255,255,255,0.06)}
.impact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:56px}
.impact-card{padding:36px;border-top:2px solid #dbf343}
.impact-num{font-family:'Bebas Neue',sans-serif;font-size:52px;color:#dbf343;line-height:1;margin-bottom:8px}
.impact-label{font-size:12px;font-weight:600;color:#f7f7f7;margin-bottom:8px;letter-spacing:.5px}
.impact-desc{font-size:12px;line-height:1.7;color:#ccc;text-align:justify}

/* ROSTER PREVIEW */
.roster-section{padding:80px 48px;border-bottom:1px solid rgba(255,255,255,0.06)}
.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:2px;margin-top:48px;grid-auto-rows:1fr}

/* WHAT WE DO (SERVICES LIST) */
.what-we-do{padding:80px 48px;border-bottom:1px solid rgba(255,255,255,0.06)}
.services-list{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}
.svc-tag{padding:12px 24px;background:#1a1a1a;border:1px solid rgba(255,255,255,0.08);border-radius:2px;font-size:11px;font-weight:600;color:#f7f7f7;letter-spacing:0.5px;transition:all .2s}
.svc-tag:hover{border-color:#dbf343;color:#dbf343;transform:translateY(-2px);box-shadow:0 4px 12px rgba(219,243,67,.08)}

/* ROSTER DESCRIPTIONS */
.roster-desc{padding:20px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.roster-desc-name{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#f7f7f7;margin-bottom:6px;line-height:1}
.roster-desc-text{font-size:13px;color:#ccc;line-height:1.75;text-align:justify}

/* SERVICES */
.services{padding:80px 48px;border-bottom:1px solid rgba(255,255,255,0.06)}
.services-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;margin-top:56px}
.svc-card{background:#1a1a1a;border:1px solid rgba(255,255,255,0.05);padding:36px;transition:border-color .2s}
.svc-card:hover{border-color:rgba(104,11,214,.3)}
.svc-tier{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#dbf343;margin-bottom:12px}
.svc-name{font-family:'Bebas Neue',sans-serif;font-size:30px;color:#f7f7f7;margin-bottom:10px}
.svc-price{font-size:13px;color:#f7f7f7;margin-bottom:18px}
.svc-list{list-style:none}
.svc-list li{font-size:12px;color:#ccc;line-height:1.6;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:10px;text-align:justify}
.svc-list li::before{content:'→';color:#dbf343;flex-shrink:0}

/* CLOSING CTA */
.cta-section{padding:120px 48px;text-align:center;background:linear-gradient(160deg,#111010 0%,#141214 100%);position:relative;overflow:hidden}
.cta-section::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(104,11,214,0.04) 0%,transparent 70%);pointer-events:none}
.cta-label{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#dbf343;margin-bottom:24px}
.cta-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,7vw,100px);line-height:.9;color:#f7f7f7;margin-bottom:24px}
.cta-sub{font-size:15px;color:#ccc;max-width:520px;margin:0 auto 48px;line-height:1.7;text-align:justify}
.cta-contact{font-size:11px;color:#f7f7f7;margin-top:40px;letter-spacing:1px}
.cta-contact span{color:#dbf343}

/* FOOTER */
.footer{padding:40px 48px 80px;border-top:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;gap:16px}
.footer-brand{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:rgba(247,247,247,.2)}
.footer-tagline{font-size:11px;color:#ccc;font-style:italic}

/* ═══════════════════════════════════════
   PRESS KIT (artistas)
═══════════════════════════════════════ */
.home-pk{padding:44px 32px}
.home-pk-title{font-family:'Bebas Neue',sans-serif;font-size:60px;line-height:.88;margin-bottom:6px;color:#f7f7f7}
.home-pk-title em{color:#dbf343;font-style:normal}
.home-pk-sub{font-size:10px;color:#ccc;letter-spacing:2px;text-transform:uppercase;padding-bottom:28px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:32px}
.roster-pk{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:2px;grid-auto-rows:1fr}

/* ROSTER CARD — PREMIUM REDESIGN */
.rc{cursor:pointer;background:#1a1a1a;border:1px solid rgba(255,255,255,0.06);overflow:hidden;position:relative;transition:border-color .3s;display:flex;flex-direction:column;height:100%}
.rc::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,0.06) 50%,transparent 100%);opacity:0;transition:opacity .4s ease;pointer-events:none;z-index:3}
.rc:hover{border-color:rgba(219,243,67,.4)}
.rc:hover::after{opacity:1}
.rc-art{aspect-ratio:4/5;position:relative;overflow:hidden;background:#111010;flex-shrink:0}
.rc-art img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform .4s ease}
.rc:hover .rc-art img{transform:scale(1.05)}
.rc-grad{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:1;pointer-events:none}
.rc-badge{position:absolute;top:12px;right:12px;z-index:2;font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:2px;background:#dbf343;color:#111010}
.rc-body{padding:14px 18px 20px;flex:1;display:flex;flex-direction:column}
.rc-num{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;margin-bottom:3px;color:#dbf343;flex-shrink:0}
.rc-name{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;color:#f7f7f7;flex-shrink:0}
.rc-alias{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin:3px 0 10px;color:#680bd6;flex-shrink:0}
.rc-quote{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:#680bd6;line-height:1.4;margin:3px 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex-shrink:0}
.rc-stats-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:auto}
.rc-stat{font-size:10px;color:#ccc}
.rc-stat strong{color:#f7f7f7;font-weight:700}
.rc-arr{position:absolute;bottom:14px;right:14px;font-size:16px;color:rgba(219,243,67,.2);transition:all .3s;z-index:2}
.rc:hover .rc-arr{color:#dbf343;transform:translate(3px,-3px)}

/* ARTIST PAGE */
.ahero{display:grid;grid-template-columns:1fr 1fr;min-height:520px;border-bottom:1px solid rgba(255,255,255,0.05)}
.ahero-left{padding:40px 32px;display:flex;flex-direction:column;justify-content:flex-end}
.ahero-right{position:relative;overflow:hidden;background-size:contain;background-repeat:no-repeat;background-position:center center;background-color:#0d0d0d;transition:background-image .4s ease}
.hero-dots{display:flex;justify-content:center;gap:8px;padding:10px 0;background:#111010;border-bottom:1px solid rgba(255,255,255,0.05)}
.hero-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:all .3s}
.hero-dot.active{background:#dbf343;border-color:#dbf343;box-shadow:0 0 8px rgba(219,243,67,.4)}
.ahero-right-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px}
.ahero-grad{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.35) 0%,transparent 50%);pointer-events:none;transition:background .3s}
.ahero-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:5;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,0.15);color:#f7f7f7;width:38px;height:38px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;line-height:1;padding:0}
.ahero-arrow:hover{background:rgba(219,243,67,.85);color:#111010;border-color:#dbf343}
.ahero-arrow-left{left:14px}
.ahero-arrow-right{right:14px}
.ahero-quote-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:4;font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,3.5vw,48px);color:#f7f7f7;text-shadow:0 2px 12px rgba(0,0,0,.7),0 0 40px rgba(0,0,0,.5);text-align:center;pointer-events:none;letter-spacing:1px;line-height:1.1;white-space:nowrap}
.ahero-city-tag{position:absolute;bottom:16px;left:16px;z-index:5;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(247,247,247,.45);background:rgba(0,0,0,.4);padding:3px 10px;border-radius:2px}
.a-pill{display:inline-block;font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:2px;margin-bottom:14px;align-self:flex-start;background:#dbf343;color:#111010}
.a-name{font-family:'Bebas Neue',sans-serif;font-size:80px;line-height:.85;letter-spacing:-1px;color:#f7f7f7;margin-bottom:10px}
.a-alias{font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:14px;color:#680bd6}
.a-quote{font-size:13px;color:#ccc;line-height:1.65;max-width:480px;border-left:2px solid #dbf343;padding-left:14px;font-style:italic;text-align:justify}
.avatar-circle{width:88px;height:88px;border-radius:50%;border:2px solid #dbf343;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:32px;background:rgba(0,0,0,.5);position:relative;z-index:1;color:#dbf343}
.avatar-city{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(247,247,247,.3);position:relative;z-index:1}
.avatar-line{position:relative;z-index:1;height:1px;width:28px;background:#dbf343}
.rel-banner{display:flex;align-items:stretch;border-bottom:1px solid rgba(255,255,255,0.05)}
.rel-bar{width:4px;flex-shrink:0;background:#dbf343}
.rel-body{padding:14px 24px;display:flex;align-items:center;gap:16px;width:100%;flex-wrap:wrap}
.rel-tag{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;flex-shrink:0;color:#dbf343}
.rel-name{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#f7f7f7;letter-spacing:.5px}
.rel-info{font-size:11px;color:#ccc;margin-left:auto}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid rgba(255,255,255,0.05)}
.stat-box{padding:18px 20px;border-right:1px solid rgba(255,255,255,0.05)}
.stat-box:last-child{border-right:none}
.stat-box:not(:last-child){border-right:1px solid rgba(255,255,255,0.05)}
.stat-plat{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;color:#dbf343}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#f7f7f7;line-height:1.1}
.stat-sub{font-size:9px;color:#ccc;margin-top:2px}
.sec{padding:26px 32px;border-bottom:1px solid rgba(255,255,255,0.05)}
.sec-label{font-size:8px;letter-spacing:3px;text-transform:uppercase;font-weight:800;margin-bottom:16px;color:#dbf343}
.bio-short{font-size:15px;line-height:1.8;max-width:800px;color:#ccc;text-align:justify}
.bio-long{font-size:12px;line-height:1.85;color:#ccc;max-width:700px;margin-top:14px;display:none;text-align:justify}
.bio-long.open{display:block}
.bio-long p{margin-bottom:11px;text-align:justify}
.read-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:#f7f7f7;padding:6px 16px;border-radius:2px;font-size:10px;cursor:pointer;margin-top:12px;letter-spacing:1px;text-transform:uppercase;font-family:'Inter',sans-serif;transition:all .15s}
.read-btn:hover{border-color:#680bd6;color:#680bd6}
.pal-row{display:flex;gap:4px;margin-top:10px}
.pal-swatch{height:28px;flex:1;border-radius:2px;border:1px solid rgba(255,255,255,0.07);cursor:default;position:relative}
.pal-swatch:hover::after{content:attr(data-hex);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);font-size:8px;background:#222;color:#f7f7f7;padding:2px 6px;border-radius:2px;white-space:nowrap;z-index:10;font-family:'Inter',sans-serif}
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:5px}
.link-item{background:#1a1a1a;border:1px solid rgba(255,255,255,0.06);border-radius:2px;padding:9px 13px;display:flex;align-items:center;gap:8px;text-decoration:none;transition:all .15s}
.link-item:hover{border-color:rgba(104,11,214,.5);background:rgba(104,11,214,.04)}
.link-plat{font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#dbf343;min-width:56px}
.link-handle{font-size:10px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-left:auto;background:#dbf343}
.a-footer{padding:20px 32px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,0.04)}
.a-footer-brand{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:rgba(247,247,247,.15)}
.a-footer-contact{font-size:10px;color:#ccc}
.a-footer-contact span{color:#dbf343}

/* YOUTUBE / MUSIC CTA */
.music-cta-section{padding:28px 32px;background:linear-gradient(135deg,rgba(104,11,214,0.12) 0%,rgba(219,243,67,0.04) 100%);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.music-cta-left{display:flex;align-items:center;gap:14px}
.music-cta-icon{width:44px;height:44px;border-radius:50%;background:#dbf343;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#111010;font-size:20px}
.music-cta-text{font-size:12px;color:#ccc;line-height:1.5}
.music-cta-text strong{color:#dbf343;font-weight:700}
.music-cta-btn{display:inline-flex;align-items:center;gap:8px;background:#dbf343;color:#111010;border:none;padding:12px 24px;font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:2px;font-family:'Inter',sans-serif;text-decoration:none;transition:all .2s;white-space:nowrap;flex-shrink:0}
.music-cta-btn:hover{background:#e8f95a;transform:translateY(-2px);box-shadow:0 6px 20px rgba(219,243,67,.25)}

/* WHATSAPP FLOATING BUTTON */
@keyframes wp-pulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.6),0 4px 16px rgba(37,211,102,.4)}70%{box-shadow:0 0 0 18px rgba(37,211,102,0),0 4px 16px rgba(37,211,102,.4)}100%{box-shadow:0 0 0 0 rgba(37,211,102,0),0 4px 16px rgba(37,211,102,.4)}}
@keyframes wp-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.whatsapp-float{position:fixed;bottom:24px;right:24px;z-index:999;width:60px;height:60px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(37,211,102,.4);transition:transform .25s,box-shadow .25s;border:none;text-decoration:none;animation:wp-pulse 2.5s ease-in-out infinite,wp-float 4s ease-in-out infinite}
.whatsapp-float:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(37,211,102,.55);animation-play-state:paused}
.whatsapp-float svg{width:32px;height:32px;fill:#fff}
.whatsapp-float::after{content:'Contactar por WhatsApp';position:absolute;right:70px;background:#1a1a1a;color:#f7f7f7;font-size:11px;padding:8px 14px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;font-family:'Inter',sans-serif;border:1px solid rgba(255,255,255,0.08)}
.whatsapp-float:hover::after{opacity:1}

/* PALETTE INFO NOTE */
.pal-note{font-size:10px;color:#ccc;margin-top:4px;font-style:italic}

/* PROVIDED BY INNOVATEX */
.provided-by{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:#ccc;font-size:10px;letter-spacing:1px;font-family:'Inter',sans-serif;transition:color .25s;margin-left:auto;flex-shrink:0;margin-right:80px}
.provided-by:hover{color:#e8f95a}
.provided-by img{height:32px;width:auto;object-fit:contain;opacity:.5;transition:opacity .25s}
.provided-by:hover img{opacity:1}
.provided-by span{font-weight:600}
.footer-left-group{display:flex;align-items:center;gap:16px;flex-wrap:wrap;flex:1}
.footer-right-group{display:flex;align-items:center;gap:20px;flex-shrink:0}

function initials(name){ return name.split(' ').map(w=>w[0]).join('').substring(0,2); }

function buildRosterCard(a,idx){
  const d=document.createElement('div');
  d.className='rc';
  const imgHtml = a.image ? `<img src="${a.image}" alt="${a.name}" loading="lazy">` : '';
  const artStyle = a.image ? '' : `background:${a.artBg}`;
  d.innerHTML=`
    <div class="rc-art" style="${artStyle}">
      ${imgHtml}
      <div class="rc-grad"></div>
      <div class="rc-badge">${a.genre.split('·')[0].trim()}</div>
    </div>
    <div class="rc-body">
      <div class="rc-num">0${idx+1}</div>
      <div class="rc-name">${a.name}</div>
      ${a.alias?`<div class="rc-alias">"${a.alias}"</div>`:''}
      ${(!a.alias && !a.hideCardQuote && a.quote)?`<div class="rc-quote">"${a.quote}"</div>`:''}
      <div style="height:6px"></div>
      <div class="rc-stats-row">
        ${a.stats.slice(0,2).map(s=>`<div class="rc-stat"><strong>${s.num}</strong> ${s.plat}</div>`).join('')}
      </div>
    </div>
    <div class="rc-arr">↗</div>`;
  d.addEventListener('click',()=>showArtist(a.id));
  return d;
}

function buildArtistPage(a){

  const stats=a.stats.map(s=>`
    <div class="stat-box">
      <div class="stat-plat">${s.plat}</div>
      <div class="stat-num">${s.num}</div>
      <div class="stat-sub">${s.sub}</div>
    </div>`).join('');
  const links=a.links.map(l=>`
    <a class="link-item" href="${l.url}" target="_blank" rel="noreferrer">
      <span class="link-plat">${l.plat}</span>
      <span class="link-handle">${l.handle}</span>
      <div class="link-dot"></div>

  const bioP=a.bioLong.map(p=>`<p>${p}</p>`).join('');
const bgImage = a.image ? `background-image:url('${a.image}');background-size:contain;background-repeat:no-repeat;background-position:top center;` : `background:${a.artBg};`;
  const palHexList = a.pal.join(', ');

  // YouTube / Music CTA
  const hasYoutube = a.youtubeUrl;
  const youtubeLink = a.links.find(l => l.plat === 'YouTube');
  const spotifyLink = a.links.find(l => l.plat === 'Spotify');
  const musicUrl = hasYoutube ? a.youtubeUrl : (youtubeLink ? youtubeLink.url : (spotifyLink ? spotifyLink.url : '#'));
  const ctaText = (hasYoutube || youtubeLink)

    : `Escucha a <strong>${a.name}</strong> en Spotify — Descubre su música ahora 🎧`;
  const ctaBtnText = (hasYoutube || youtubeLink) ? '▶ Ver en YouTube' : '♫ Escuchar en Spotify';
  const ctaIcon = (hasYoutube || youtubeLink) ? '▶' : '♫';

  return `
  <div class="ahero">
    <div class="ahero-left">
      <div class="a-pill">${a.genre}</div>
      <div class="a-name">${a.name}</div>
      ${a.alias?`<div class="a-alias">— "${a.alias}" —</div>`:''}

    <div class="ahero-right" style="${bgImage}">

      <div class="ahero-quote-overlay">"${a.quote}"</div>
      <button class="ahero-arrow ahero-arrow-left" aria-label="Anterior foto">&lsaquo;</button>
      <button class="ahero-arrow ahero-arrow-right" aria-label="Siguiente foto">&rsaquo;</button>
      <div class="ahero-city-tag">${a.city}</div>
    </div>
  </div>
  ${a.banner?`<div class="hero-dots" id="hero-dots-${a.id}">${a.banner.map((_,i)=>`<span class="hero-dot ${i===0?'active':''}" data-index="${i}"></span>`).join('')}</div>`:''}

  <!-- MUSIC CTA -->
  <div class="music-cta-section">
    <div class="music-cta-left">
      <div class="music-cta-icon">${ctaIcon}</div>
      <div class="music-cta-text">${ctaText}</div>
    </div>
    <a class="music-cta-btn" href="${musicUrl}" target="_blank" rel="noreferrer">${ctaBtnText}</a>
  </div>

  <div class="sec" style="padding:26px 32px;border-bottom:1px solid rgba(255,255,255,0.05)">
    <div class="sec-label">Biografía</div>
    <div class="bio-short">${a.bioShort}</div>
    ${a.bioLong && a.bioLong.length > 0 ? `
    <div class="bio-long" id="bio-${a.id}">${bioP}</div>
    <button class="read-btn" id="btn-${a.id}" onclick="toggleBio('${a.id}')">Leer más ↓</button>` : ''}
  </div>
  <div class="rel-banner">
    <div class="rel-bar"></div>
    <div class="rel-body">
      <span class="rel-tag">Último lanzamiento</span>
      <span class="rel-name">${a.release.name}</span>
      <span class="rel-info">${a.release.info}</span>

  </div>
  <div class="stats-grid">${stats}</div>
  <div class="sec">

    <p class="pal-note">Paleta informativa del artista. No se usa en títulos ni elementos principales de la interfaz.</p>

function buildPressKitHome(){
  pkPanel.innerHTML=`
    <div class="home-pk">
      <div class="home-pk-title">PRESS KIT<br><em>2025–26</em></div>
      <div class="home-pk-sub">Okan Music Company · Cali, Colombia · Management & Artist Development · Booking: Lacoin +57 317 445 5169</div>
    </div>
    <div class="roster-pk" id="roster-pk"></div>
  `;
  const grid=pkPanel.querySelector('#roster-pk');
  ARTISTS.forEach((a,i)=>{ grid.appendChild(buildRosterCard(a,i)); });
}

function buildPressKitArtist(id){
  const a=ARTISTS.find(x=>x.id===id);
  if(!a)return;
  pkPanel.innerHTML=buildArtistPage(a);
  // Banner slider
  if(a.banner&&a.banner.length>1){
    const rightEl=pkPanel.querySelector('.ahero-right');
    const dotsEl=pkPanel.querySelector('#hero-dots-'+a.id);
    const leftBtn=pkPanel.querySelector('.ahero-arrow-left');
    const rightBtn=pkPanel.querySelector('.ahero-arrow-right');
    let cur=0;
    function setBanner(i){
      cur=i;
      rightEl.style.backgroundImage=`url('${a.banner[cur]}')`;
      if(dotsEl){
        dotsEl.querySelectorAll('.hero-dot').forEach((d,di)=>{ d.classList.toggle('active',di===cur); });
      }
    }
    if(leftBtn)leftBtn.addEventListener('click',()=>{ setBanner((cur-1+a.banner.length)%a.banner.length); });
    if(rightBtn)rightBtn.addEventListener('click',()=>{ setBanner((cur+1)%a.banner.length); });
    if(dotsEl){
      dotsEl.querySelectorAll('.hero-dot').forEach(d=>{
        d.addEventListener('click',()=>{ setBanner(parseInt(d.dataset.index)); });
      });
    }
  }
  // Bio toggle
  window._currentBioId=id;
}

  const grid=document.getElementById('roster-grid-sello');
  if(!grid)return;
  grid.innerHTML='';
  ARTISTS.forEach((a,i)=>{ grid.appendChild(buildRosterCard(a,i)); });
}

  container.innerHTML=ARTISTS.map(a=>`<div class="roster-desc"><div class="roster-desc-name">${a.name}</div><div class="roster-desc-text">${a.bioShort}</div></div>`).join('');
}

let currentPanel='sello';
let currentArtist=null;

function showPanel(name){
  currentPanel=name;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  tabsEl.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const tab=tabsEl.querySelector('[data-panel="'+name+'"]');
  if(tab)tab.classList.add('active');
  if(name==='presskit'){
    buildPressKitHome();
  }else if(name==='sello'){
    fillSelloRoster();
  }
}

function showArtist(id){
  currentArtist=id;
  currentPanel='presskit';
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-presskit').classList.add('active');
  tabsEl.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const tab=tabsEl.querySelector('[data-panel="presskit"]');
  if(tab)tab.classList.add('active');
  buildPressKitArtist(id);
}

function toggleBio(id){
  const el=document.getElementById('bio-'+id);
  const btn=document.getElementById('btn-'+id);
  if(!el||!btn)return;
  el.classList.toggle('open');
  btn.textContent=el.classList.contains('open')?'Leer menos ↑':'Leer más ↓';
}

// NAV TABS CLICK
tabsEl.addEventListener('click',e=>{
  const tab=e.target.closest('.tab');
  if(!tab)return;
  const panel=tab.dataset.panel;
  if(panel==='presskit'){
    showPanel('presskit');
  }else{
    showPanel('sello');
  }
});

// WHATSAPP
document.getElementById('whatsapp-float-btn').addEventListener('click',()=>{
  const msg=encodeURIComponent('Hola OKAN Music, me interesa conocer más sobre sus servicios y artistas.');
  window.open('https://wa.me/573174455169?text='+msg,'_blank');
});

// STATS SLIDER (solo en mobile)
function initStatsSlider(){
  const track=document.getElementById('stats-track');
  const dots=document.querySelectorAll('#stats-indicators .stats-dot');
  if(!track||!dots.length)return;
  let slide=0;
  const total=dots.length;
  function go(i){
    slide=i;
    track.style.transform=`translateX(-${slide*100}%)`;
    dots.forEach((d,di)=>d.classList.toggle('active',di===slide));
  }
  dots.forEach(d=>{d.addEventListener('click',()=>{go(parseInt(d.dataset.index));});});
  // Auto slide cada 8 segundos (más pausado y legible)
  setInterval(()=>{go((slide+1)%total);},8000);
}

// INIT
fillSelloRoster();

setTimeout(initStatsSlider,100);
</script>
